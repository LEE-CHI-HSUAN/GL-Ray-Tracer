name: CMake on multiple platforms

on:
  push:
    branches: [ "main", "action" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      # 4. <macOS, Release, Apple Clang compiler toolchain on the default runner image, default generator>
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc
          - os: macos-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'

    - name: Install dependencies (Linux)
    # Install OpenGL, GLEW, and FreeGLUT on Linux
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install -y libgl1-mesa-dev libglu1-mesa-dev libglew-dev freeglut3-dev

    - name: Install dependencies (Windows)
    # Install GLEW and FreeGLUT on Windows using pre-installed vcpkg
      if: runner.os == 'Windows'
      run: |
        vcpkg install glew:x64-windows freeglut:x64-windows

    - name: Install dependencies (macOS)
    # Install GLEW and FreeGLUT on macOS using Homebrew
      if: runner.os == 'macOS'
      run: |
        brew install glew freeglut

    - name: Set Windows-specific CMake options
    # Tell CMake where to find vcpkg libraries on Windows (evaluated in the Configure CMake step)
      if: runner.os == 'Windows'
      shell: bash
      run: echo "CMAKE_EXTRA_FLAGS=-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV

    - name: Set macOS-specific CMake options
    # Tell CMake where to find Homebrew libraries on macOS (evaluated in the Configure CMake step)
      if: runner.os == 'macOS'
      shell: bash
      run: echo "CMAKE_EXTRA_FLAGS=-DCMAKE_PREFIX_PATH=/opt/homebrew" >> $GITHUB_ENV

    - name: Set reusable strings
      # Use a relative 'build' path to avoid backslash escaping issues on Windows
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      shell: bash
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        $CMAKE_EXTRA_FLAGS
        -S .

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --build-config ${{ matrix.build_type }}
